AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Amazon CloudFront distribution for GEO Edge Serving.
  Creates a distribution with the origin site as default origin,
  GEO Lambda as secondary origin, and CloudFront Function for bot routing.

Parameters:
  OriginDomain:
    Type: String
    Description: Origin site domain (e.g. www.setn.com, today.line.me)
  OriginProtocolPolicy:
    Type: String
    Default: https-only
    AllowedValues: [https-only, http-only, match-viewer]
    Description: Protocol policy for the origin site
  GeoFunctionUrlDomain:
    Type: String
    Description: >-
      Lambda Function URL domain (without https://).
      Get from geo-backend stack output: FunctionUrl
  GeoOacId:
    Type: String
    Description: >-
      OAC ID for Lambda Function URL.
      Get from geo-backend stack output: OacId
  OriginVerifySecret:
    Type: String
    Default: "geo-agent-cf-origin-2026"
    Description: Shared secret for x-origin-verify header
  PriceClass:
    Type: String
    Default: PriceClass_All
    AllowedValues: [PriceClass_100, PriceClass_200, PriceClass_All]
  CachePolicyId:
    Type: String
    Default: "658327ea-f89d-4fab-a63d-7e88639e58f6"
    Description: >-
      Cache policy ID. Default is CachingOptimized.
      Use 4135ea2d-6df8-44a3-9df3-4b5a84be39ad for CachingDisabled.
  OriginRequestPolicyId:
    Type: String
    Default: "b689b0a8-53d0-40ab-baf2-68738e2966ac"
    Description: >-
      Origin request policy ID. Default is AllViewerExceptHostHeader.
      Do NOT use AllViewer — it forwards the Host header which breaks
      OAC SigV4 signing for Lambda Function URLs.
  AcmCertificateArn:
    Type: String
    Description: >-
      ACM certificate ARN (must be in us-east-1) for the distribution.
      Required for custom domain names and TLS compliance.
  DomainAliases:
    Type: CommaDelimitedList
    Default: ""
    Description: >-
      Comma-separated list of custom domain names (CNAMEs).
      Must match the ACM certificate domain names.

Conditions:
  HasAliases: !Not [!Equals [!Select [0, !Ref DomainAliases], ""]]

Resources:
  S3AccessLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "geo-s3-access-logs-${AWS::AccountId}-${AWS::StackName}"
      AccessControl: Private
      ObjectLockEnabled: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LoggingConfiguration:
        LogFilePrefix: "self-access-logs/"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireLogs
            Status: Enabled
            ExpirationInDays: 90

  AccessLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "geo-cf-access-logs-${AWS::AccountId}-${AWS::StackName}"
      AccessControl: Private
      ObjectLockEnabled: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LoggingConfiguration:
        DestinationBucketName: !Ref S3AccessLogBucket
        LogFilePrefix: "s3-access-logs/"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireLogs
            Status: Enabled
            ExpirationInDays: 90

  GeoCff:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "geo-bot-router-${AWS::StackName}"
      AutoPublish: true
      FunctionConfig:
        Comment: !Sub "GEO bot router for ${OriginDomain}"
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        import cf from 'cloudfront';
        var AI_BOT_PATTERNS = [
          'gptbot', 'oai-searchbot', 'chatgpt-user',
          'claudebot', 'claude-web', 'claude-user',
          'perplexitybot', 'perplexity-user',
          'google-extended', 'googleother',
          'bingbot', 'copilot',
          'meta-externalagent', 'facebookbot',
          'applebot', 'applebot-extended',
          'cohere-ai', 'amazonbot', 'bytespider', 'ccbot', 'diffbot', 'youbot'
        ];
        var GEO_ORIGIN_ID = 'geo-lambda-origin';
        function handler(event) {
          var request = event.request;
          var ua = (request.headers['user-agent'] && request.headers['user-agent'].value) || '';
          var uaLower = ua.toLowerCase();
          var isAiBot = false;
          for (var i = 0; i < AI_BOT_PATTERNS.length; i++) {
            if (uaLower.indexOf(AI_BOT_PATTERNS[i]) !== -1) { isAiBot = true; break; }
          }
          if (!isAiBot && request.querystring && request.querystring.ua && request.querystring.ua.value === 'genaibot') {
            isAiBot = true;
          }
          if (isAiBot) {
            request.headers['x-geo-bot'] = { value: 'true' };
            request.headers['x-geo-bot-ua'] = { value: ua };
            request.headers['x-original-host'] = { value: request.headers['host'] ? request.headers['host'].value : '' };
            cf.selectRequestOriginById(GEO_ORIGIN_ID);
          }
          return request;
        }

  GeoDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "GEO Edge Serving - ${OriginDomain}"
        PriceClass: !Ref PriceClass
        HttpVersion: http2and3
        DefaultRootObject: ""
        Aliases: !If [HasAliases, !Ref DomainAliases, !Ref "AWS::NoValue"]
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Logging:
          Bucket: !GetAtt AccessLogBucket.DomainName
          IncludeCookies: false
          Prefix: !Sub "cf-logs/${OriginDomain}/"
        Origins:
          - Id: default-origin
            DomainName: !Ref OriginDomain
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: !Ref OriginProtocolPolicy
              OriginSSLProtocols:
                - TLSv1.2
          - Id: geo-lambda-origin
            DomainName: !Ref GeoFunctionUrlDomain
            OriginPath: ""
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 5
            OriginAccessControlId: !Ref GeoOacId
            OriginCustomHeaders:
              - HeaderName: x-origin-verify
                HeaderValue: !Ref OriginVerifySecret
        DefaultCacheBehavior:
          TargetOriginId: default-origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: !Ref CachePolicyId
          OriginRequestPolicyId: !Ref OriginRequestPolicyId
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt GeoCff.FunctionMetadata.FunctionARN

Outputs:
  DistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref GeoDistribution
  DistributionArn:
    Description: CloudFront Distribution ARN
    Value: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${GeoDistribution}"
  DistributionDomain:
    Description: CloudFront Distribution domain name
    Value: !GetAtt GeoDistribution.DomainName
  CffArn:
    Description: CloudFront Function ARN
    Value: !GetAtt GeoCff.FunctionMetadata.FunctionARN
  AccessLogBucket:
    Description: S3 bucket for CloudFront access logs
    Value: !Ref AccessLogBucket