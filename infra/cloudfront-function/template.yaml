AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFront Function for GEO bot routing

Parameters:
  GeoApiDomain:
    Type: String
    Description: Origin domain for GEO content (Lambda Function URL or API Gateway domain)
  GeoApiPath:
    Type: String
    Default: ''
    Description: Origin path (empty for Lambda Function URL, /prod for API Gateway)

Resources:
  GeoRouterFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: geo-bot-router
      AutoPublish: true
      FunctionConfig:
        Comment: Routes AI bot requests to GEO-optimized content origin
        Runtime: cloudfront-js-2.0
      FunctionCode: !Sub |
        import cf from 'cloudfront';

        var AI_BOT_PATTERNS = [
          'gptbot', 'oai-searchbot', 'chatgpt-user',
          'claudebot', 'claude-web', 'claude-user',
          'perplexitybot', 'perplexity-user',
          'google-extended', 'googleother',
          'bingbot', 'copilot',
          'meta-externalagent', 'facebookbot',
          'applebot', 'applebot-extended',
          'cohere-ai', 'amazonbot', 'bytespider', 'ccbot', 'diffbot', 'youbot'
        ];

        var GEO_ORIGIN_DOMAIN = '${GeoApiDomain}';
        var GEO_ORIGIN_PATH = '${GeoApiPath}';

        function handler(event) {
          var request = event.request;
          var ua = (request.headers['user-agent'] && request.headers['user-agent'].value) || '';
          var uaLower = ua.toLowerCase();

          var isAiBot = false;
          for (var i = 0; i < AI_BOT_PATTERNS.length; i++) {
            if (uaLower.indexOf(AI_BOT_PATTERNS[i]) !== -1) {
              isAiBot = true;
              break;
            }
          }

          if (isAiBot) {
            request.headers['x-geo-bot'] = { value: 'true' };
            request.headers['x-geo-bot-ua'] = { value: ua };

            cf.updateRequestOrigin({
              domainName: GEO_ORIGIN_DOMAIN,
              originPath: GEO_ORIGIN_PATH,
              originAccessControlConfig: { enabled: false }
            });
          }

          return request;
        }

Outputs:
  FunctionARN:
    Description: CloudFront Function ARN - associate this with your distribution's viewer-request event
    Value: !GetAtt GeoRouterFunction.FunctionMetadata.FunctionARN
