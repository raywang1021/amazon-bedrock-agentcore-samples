AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >-
  OAC Test — fully independent stack.
  Own Lambda functions + CloudFront distribution + Lambda Function URL (IAM auth) + OAC.
  Shares only DynamoDB table with main stack.

Parameters:
  TableName:
    Type: String
    Default: geo-content
  AgentRuntimeArn:
    Type: String
    Default: ""
  DefaultOriginHost:
    Type: String
    Default: ""
    Description: Main CloudFront domain for passthrough fetch (e.g. d1sv1ydutd4m98.cloudfront.net)
  DefaultOriginDomain:
    Type: String
    Default: "news.tvbs.com.tw"
    Description: Default origin for non-GEO paths (customer origin site)
  CfDistributionId:
    Type: String
    Default: ""
    Description: CloudFront distribution ID for cache invalidation on purge

Conditions:
  HasAgentArn: !Not [!Equals [!Ref AgentRuntimeArn, ""]]

Resources:
  # ============================================================
  # Lambda: handler (independent copy)
  # ============================================================
  OacTestHandler:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: geo-oac-test-handler
      Handler: geo_content_handler.handler
      Runtime: python3.12
      CodeUri: ./
      MemorySize: 256
      Timeout: 90
      FunctionUrlConfig:
        AuthType: AWS_IAM
      Environment:
        Variables:
          GEO_TABLE_NAME: !Ref TableName
          GENERATOR_FUNCTION_NAME: !Ref OacTestGenerator
          DEFAULT_ORIGIN_HOST: !Ref DefaultOriginHost
          AGENT_RUNTIME_ARN: !Ref AgentRuntimeArn
          AGENTCORE_REGION: !Ref "AWS::Region"
          ORIGIN_VERIFY_SECRET: "geo-agent-cf-origin-2026"
          GEO_TTL_SECONDS: "86400"
          CF_DISTRIBUTION_ID: !Ref CfDistributionId
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
        - LambdaInvokePolicy:
            FunctionName: !Ref OacTestGenerator
        - Statement:
            - Effect: Allow
              Action: cloudfront:CreateInvalidation
              Resource: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/*"
        - Statement:
            - Effect: Allow
              Action: bedrock-agentcore:InvokeAgentRuntime
              Resource:
                - !If
                  - HasAgentArn
                  - !Ref AgentRuntimeArn
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*"
                - !If
                  - HasAgentArn
                  - !Sub "${AgentRuntimeArn}/runtime-endpoint/*"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*/runtime-endpoint/*"

  # ============================================================
  # Lambda: generator (independent copy)
  # ============================================================
  OacTestGenerator:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: geo-oac-test-generator
      Handler: geo_generator.handler
      Runtime: python3.12
      CodeUri: ./
      MemorySize: 512
      Timeout: 120
      Environment:
        Variables:
          GEO_TABLE_NAME: !Ref TableName
          AGENT_RUNTIME_ARN: !Ref AgentRuntimeArn
          AGENTCORE_REGION: !Ref "AWS::Region"
          GEO_TTL_SECONDS: "86400"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
        - Statement:
            - Effect: Allow
              Action: bedrock-agentcore:InvokeAgentRuntime
              Resource:
                - !If
                  - HasAgentArn
                  - !Ref AgentRuntimeArn
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*"
                - !If
                  - HasAgentArn
                  - !Sub "${AgentRuntimeArn}/runtime-endpoint/*"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*/runtime-endpoint/*"

  # ============================================================
  # CloudFront permission to invoke Lambda via Function URL (OAC)
  # ============================================================
  CloudFrontInvokeFunctionUrl:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OacTestHandler
      Action: lambda:InvokeFunctionUrl
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${OacTestDistribution}"
      FunctionUrlAuthType: AWS_IAM

  CloudFrontInvokeFunction:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OacTestHandler
      Action: lambda:InvokeFunction
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${OacTestDistribution}"

  # ============================================================
  # Cache Policy: respect origin Cache-Control, include ua/mode/purge in cache key
  # ============================================================
  GeoCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: geo-origin-cache-policy
        DefaultTTL: 0
        MinTTL: 0
        MaxTTL: 86400
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - x-geo-bot
              - x-original-host
          CookiesConfig:
            CookieBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: whitelist
            QueryStrings:
              - ua
              - mode
              - purge

  # ============================================================
  # Origin Access Control
  # ============================================================
  GeoLambdaOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: geo-lambda-oac-test
        Description: OAC for GEO Lambda Function URL (test stack)
        SigningProtocol: sigv4
        SigningBehavior: always
        OriginAccessControlOriginType: lambda

  # ============================================================
  # CloudFront Distribution (independent test)
  # ============================================================
  OacTestDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: "OAC Test - GEO Lambda Function URL (independent)"
        HttpVersion: http2and3
        PriceClass: PriceClass_100

        Origins:
          # Default origin (placeholder for non-matching paths)
          - Id: default-origin
            DomainName: !Ref DefaultOriginDomain
            CustomOriginConfig:
              OriginProtocolPolicy: https-only

          # GEO Lambda Function URL with OAC
          - Id: geo-lambda-origin
            DomainName: !Select
              - 2
              - !Split ["/", !GetAtt OacTestHandlerUrl.FunctionUrl]
            OriginAccessControlId: !Ref GeoLambdaOac
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
            OriginCustomHeaders:
              - HeaderName: x-origin-verify
                HeaderValue: geo-agent-cf-origin-2026

        DefaultCacheBehavior:
          TargetOriginId: default-origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: !Ref GeoCachePolicy
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !Sub "arn:aws:cloudfront::${AWS::AccountId}:function/geo-bot-router-oac"

  # ============================================================
  # CloudWatch Alarms
  # ============================================================
  GeneratorErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: geo-generator-errors
      AlarmDescription: GEO generator Lambda error rate > 3 in 5 minutes
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref OacTestGenerator
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  HandlerP99LatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: geo-handler-p99-latency
      AlarmDescription: GEO handler Lambda P99 duration > 10s
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref OacTestHandler
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  DistributionDomain:
    Description: Test CloudFront distribution domain
    Value: !GetAtt OacTestDistribution.DomainName
  DistributionId:
    Description: Test CloudFront distribution ID
    Value: !Ref OacTestDistribution
  FunctionUrl:
    Description: Lambda Function URL (IAM auth — not publicly accessible)
    Value: !GetAtt OacTestHandlerUrl.FunctionUrl
  HandlerFunctionName:
    Description: Test handler Lambda
    Value: !Ref OacTestHandler
  GeneratorFunctionName:
    Description: Test generator Lambda
    Value: !Ref OacTestGenerator
  OacId:
    Description: Origin Access Control ID
    Value: !Ref GeoLambdaOac
