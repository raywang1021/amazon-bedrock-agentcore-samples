AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >-
  GEO Edge Serving Infrastructure (OAC mode).
  Lambda Function URL + CloudFront OAC (SigV4, zero extra cost).

Parameters:
  TableName:
    Type: String
    Default: geo-content
  AgentRuntimeArn:
    Type: String
    Default: ""
    Description: AgentCore Runtime ARN for on-the-fly GEO content generation
  DefaultOriginHost:
    Type: String
    Default: ""
    Description: Default origin host for reconstructing original URLs
  OriginVerifySecret:
    Type: String
    Default: "geo-agent-cf-origin-2026"
    Description: Shared secret for defense-in-depth origin verification
  CloudFrontDistributionArn:
    Type: String
    Default: ""
    Description: >-
      CloudFront distribution ARN for Lambda permission.
      Format: arn:aws:cloudfront::ACCOUNT:distribution/DIST_ID
  CreateDistribution:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      Whether to create a new CloudFront distribution.
      Set to true when no existing distribution is provided.
  CreateTable:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >-
      Whether to create the DynamoDB table. Set to false when sharing
      an existing table across multiple stacks (multi-tenant).
  SetupCfOrigin:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      Auto-configure existing CloudFront distribution: add Lambda origin
      with OAC and associate CFF. Requires CloudFrontDistributionArn.
  CffArn:
    Type: String
    Default: ""
    Description: >-
      ARN of the CloudFront Function to associate with the distribution.
  CffBehaviorPath:
    Type: String
    Default: "*"
    Description: >-
      Cache behavior path pattern to attach CFF to.
      Use "*" for default behavior, or a specific path pattern.

Conditions:
  HasAgentArn: !Not [!Equals [!Ref AgentRuntimeArn, ""]]
  HasCfDistArn: !Not [!Equals [!Ref CloudFrontDistributionArn, ""]]
  ShouldCreateTable: !Equals [!Ref CreateTable, "true"]
  ShouldCreateDistribution: !Equals [!Ref CreateDistribution, "true"]
  ShouldSetupCfOrigin: !And
    - !Equals [!Ref SetupCfOrigin, "true"]
    - !Condition HasCfDistArn

Resources:
  # ============================================================
  # OAC: Lambda Function URL + Origin Access Control
  # ============================================================
  GeoFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: AWS_IAM
      TargetFunctionArn: !GetAtt GeoContentFunction.Arn

  GeoLambdaOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: geo-lambda-oac
        Description: OAC for GEO Lambda Function URL (SigV4)
        SigningProtocol: sigv4
        SigningBehavior: always
        OriginAccessControlOriginType: lambda

  # Allow ALL CloudFront distributions in this account to invoke the Lambda.
  # Multiple distributions share this single handler for multi-tenancy.
  CloudFrontInvokeFunctionUrl:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GeoContentFunction
      Action: lambda:InvokeFunctionUrl
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/*"
      FunctionUrlAuthType: AWS_IAM

  CloudFrontInvokeFunction:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GeoContentFunction
      Action: lambda:InvokeFunction
      Principal: cloudfront.amazonaws.com
      SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/*"

  # ============================================================
  # NEW CloudFront Distribution (created when no existing one)
  # Includes: CFF, cache policy, OAC, Lambda origin
  # ============================================================
  GeoCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Condition: ShouldCreateDistribution
    Properties:
      CachePolicyConfig:
        Name: !Sub "${AWS::StackName}-geo-cache-policy"
        DefaultTTL: 0
        MaxTTL: 86400
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - x-geo-bot
              - x-original-host
          CookiesConfig:
            CookieBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: all

  GeoBotRouterFunction:
    Type: AWS::CloudFront::Function
    Condition: ShouldCreateDistribution
    Properties:
      Name: !Sub "${AWS::StackName}-geo-bot-router"
      AutoPublish: true
      FunctionConfig:
        Comment: Routes AI bot requests to GEO Lambda origin (OAC SigV4)
        Runtime: cloudfront-js-2.0
        KeyValueStoreAssociations: []
      FunctionCode: !Sub |
        import cf from 'cloudfront';
        var AI_BOT_PATTERNS = [
          'gptbot','oai-searchbot','chatgpt-user',
          'claudebot','claude-web','claude-user',
          'perplexitybot','perplexity-user',
          'google-extended','googleother',
          'bingbot','copilot',
          'meta-externalagent','facebookbot',
          'applebot','applebot-extended',
          'cohere-ai','amazonbot','bytespider','ccbot','diffbot','youbot'
        ];
        function handler(event) {
          var request = event.request;
          var ua = (request.headers['user-agent'] && request.headers['user-agent'].value) || '';
          var uaLower = ua.toLowerCase();
          var isAiBot = false;
          for (var i = 0; i < AI_BOT_PATTERNS.length; i++) {
            if (uaLower.indexOf(AI_BOT_PATTERNS[i]) !== -1) { isAiBot = true; break; }
          }
          if (!isAiBot && request.querystring && request.querystring.ua && request.querystring.ua.value === 'genaibot') {
            isAiBot = true;
          }
          if (isAiBot) {
            request.headers['x-geo-bot'] = { value: 'true' };
            request.headers['x-geo-bot-ua'] = { value: ua };
            request.headers['x-original-host'] = { value: request.headers['host'] ? request.headers['host'].value : '' };
            cf.selectRequestOriginById('geo-lambda-origin');
          }
          return request;
        }

  GeoDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: ShouldCreateDistribution
    Properties:
      DistributionConfig:
        Comment: !Sub "GEO Edge Serving - ${DefaultOriginHost}"
        Enabled: true
        HttpVersion: http2and3
        PriceClass: PriceClass_All
        DefaultRootObject: ""
        Origins:
          # Primary origin: the actual website
          - Id: default-origin
            DomainName: !Ref DefaultOriginHost
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
              OriginReadTimeout: 30
              OriginKeepaliveTimeout: 5
          # GEO Lambda origin (OAC SigV4)
          - Id: geo-lambda-origin
            DomainName: !Select [2, !Split ["/", !GetAtt GeoFunctionUrl.FunctionUrl]]
            OriginAccessControlId: !Ref GeoLambdaOac
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
              OriginReadTimeout: 85
              OriginKeepaliveTimeout: 5
            OriginCustomHeaders:
              - HeaderName: x-origin-verify
                HeaderValue: !Ref OriginVerifySecret
        DefaultCacheBehavior:
          TargetOriginId: default-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: !Ref GeoCachePolicy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt GeoBotRouterFunction.FunctionMetadata.FunctionARN

  # ============================================================
  # Custom Resource: auto-configure existing CF distribution
  # ============================================================
  CfOriginSetupFunction:
    Type: AWS::Serverless::Function
    Condition: ShouldSetupCfOrigin
    Properties:
      FunctionName: !Sub "${AWS::StackName}-cf-origin-setup"
      Runtime: python3.12
      Handler: cf_origin_setup.handler
      CodeUri: lambda/
      MemorySize: 128
      Timeout: 60
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cloudfront:GetDistributionConfig
                - cloudfront:UpdateDistribution
              Resource: !Ref CloudFrontDistributionArn

  CfOriginSetup:
    Type: AWS::CloudFormation::CustomResource
    Condition: ShouldSetupCfOrigin
    Properties:
      ServiceToken: !GetAtt CfOriginSetupFunction.Arn
      DistributionId: !Select [1, !Split ["/", !Ref CloudFrontDistributionArn]]
      FunctionUrlDomain: !Select [2, !Split ["/", !GetAtt GeoFunctionUrl.FunctionUrl]]
      OacId: !Ref GeoLambdaOac
      OriginVerifySecret: !Ref OriginVerifySecret
      CffArn: !Ref CffArn
      BehaviorPath: !Ref CffBehaviorPath

  # ============================================================
  # DynamoDB
  # Schema supports GEO score tracking:
  #   - original_score: GEO score before rewriting
  #   - geo_score: GEO score after rewriting
  #   - score_improvement: calculated improvement (geo - original)
  # ============================================================
  GeoContentTable:
    Type: AWS::DynamoDB::Table
    Condition: ShouldCreateTable
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: url_path
          AttributeType: S
      KeySchema:
        - AttributeName: url_path
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ============================================================
  # Lambda: serves GEO content from DDB
  # ============================================================
  GeoContentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: geo-content-handler
      Handler: geo_content_handler.handler
      Runtime: python3.12
      CodeUri: lambda/
      MemorySize: 256
      Timeout: 90
      Environment:
        Variables:
          GEO_TABLE_NAME: !Ref TableName
          GENERATOR_FUNCTION_NAME: !Ref GeoGeneratorFunction
          DEFAULT_ORIGIN_HOST: !Ref DefaultOriginHost
          AGENT_RUNTIME_ARN: !Ref AgentRuntimeArn
          AGENTCORE_REGION: !Ref "AWS::Region"
          ORIGIN_VERIFY_SECRET: !Ref OriginVerifySecret
          GEO_TTL_SECONDS: "86400"
          CF_DISTRIBUTION_ID: !If
            - HasCfDistArn
            - !Select [1, !Split ["/", !Ref CloudFrontDistributionArn]]
            - ""
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
        - LambdaInvokePolicy:
            FunctionName: !Ref GeoGeneratorFunction
        - Statement:
            - Effect: Allow
              Action: bedrock-agentcore:InvokeAgentRuntime
              Resource:
                - !If
                  - HasAgentArn
                  - !Ref AgentRuntimeArn
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*"
                - !If
                  - HasAgentArn
                  - !Sub "${AgentRuntimeArn}/runtime-endpoint/*"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*/runtime-endpoint/*"
            - !If
              - HasCfDistArn
              - Effect: Allow
                Action: cloudfront:CreateInvalidation
                Resource: !Ref CloudFrontDistributionArn
              - !Ref "AWS::NoValue"

  # ============================================================
  # Lambda: async worker — invokes AgentCore to generate content
  # ============================================================
  GeoGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: geo-content-generator
      Handler: geo_generator.handler
      Runtime: python3.12
      CodeUri: lambda/
      MemorySize: 512
      Timeout: 120
      Environment:
        Variables:
          GEO_TABLE_NAME: !Ref TableName
          AGENT_RUNTIME_ARN: !Ref AgentRuntimeArn
          AGENTCORE_REGION: !Ref "AWS::Region"
          GEO_TTL_SECONDS: "86400"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
        - Statement:
            - Effect: Allow
              Action: bedrock-agentcore:InvokeAgentRuntime
              Resource:
                - !If
                  - HasAgentArn
                  - !Ref AgentRuntimeArn
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*"
                - !If
                  - HasAgentArn
                  - !Sub "${AgentRuntimeArn}/runtime-endpoint/*"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*/runtime-endpoint/*"

  # ============================================================
  # Lambda: storage — Agent writes DDB via this Lambda
  # ============================================================
  GeoStorageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: geo-content-storage
      Handler: geo_storage.handler
      Runtime: python3.12
      CodeUri: lambda/
      MemorySize: 128
      Timeout: 30
      Environment:
        Variables:
          GEO_TABLE_NAME: !Ref TableName
          GEO_TTL_SECONDS: "86400"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName

Outputs:
  TableName:
    Condition: ShouldCreateTable
    Description: DynamoDB table name
    Value: !Ref GeoContentTable
  HandlerFunctionName:
    Description: Handler Lambda function name
    Value: !Ref GeoContentFunction
  GeneratorFunctionName:
    Description: Async generator Lambda function name
    Value: !Ref GeoGeneratorFunction
  StorageFunctionName:
    Description: Storage Lambda function name
    Value: !Ref GeoStorageFunction
  FunctionUrl:
    Description: Lambda Function URL (IAM auth)
    Value: !GetAtt GeoFunctionUrl.FunctionUrl
  OacId:
    Description: Origin Access Control ID
    Value: !Ref GeoLambdaOac
  DistributionId:
    Condition: ShouldCreateDistribution
    Description: CloudFront distribution ID (auto-created)
    Value: !Ref GeoDistribution
  DistributionDomain:
    Condition: ShouldCreateDistribution
    Description: CloudFront distribution domain name
    Value: !GetAtt GeoDistribution.DomainName
