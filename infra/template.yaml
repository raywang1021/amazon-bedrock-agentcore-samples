AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GEO Edge Serving Infrastructure - DynamoDB + Lambda + API Gateway

Parameters:
  TableName:
    Type: String
    Default: geo-content
  Stage:
    Type: String
    Default: prod

Resources:
  # DynamoDB table for GEO-optimized content
  GeoContentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: url_path
          AttributeType: S
      KeySchema:
        - AttributeName: url_path
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # Lambda function to serve GEO content
  GeoContentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: geo-content-handler
      Handler: geo_content_handler.handler
      Runtime: python3.10
      CodeUri: lambda/
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          GEO_TABLE_NAME: !Ref TableName
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TableName
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: GET
            RestApiId: !Ref GeoApi

  # API Gateway
  GeoApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL for GEO content
    Value: !Sub "https://${GeoApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  TableName:
    Description: DynamoDB table name
    Value: !Ref GeoContentTable
