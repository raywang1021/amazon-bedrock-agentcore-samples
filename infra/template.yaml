AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GEO Edge Serving Infrastructure - DynamoDB + Lambda + API Gateway

Parameters:
  TableName:
    Type: String
    Default: geo-content
  Stage:
    Type: String
    Default: prod
  AgentRuntimeArn:
    Type: String
    Default: ""
    Description: AgentCore Runtime ARN for on-the-fly GEO content generation
  DefaultOriginHost:
    Type: String
    Default: ""
    Description: Default origin host for reconstructing original URLs

Conditions:
  HasAgentArn: !Not [!Equals [!Ref AgentRuntimeArn, ""]]

Resources:
  # DynamoDB table for GEO-optimized content
  GeoContentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: url_path
          AttributeType: S
      KeySchema:
        - AttributeName: url_path
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # Lambda: serves GEO content from DDB, triggers async generation on miss
  GeoContentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: geo-content-handler
      Handler: geo_content_handler.handler
      Runtime: python3.10
      CodeUri: lambda/
      MemorySize: 256
      Timeout: 90
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          GEO_TABLE_NAME: !Ref TableName
          GENERATOR_FUNCTION_NAME: !Ref GeoGeneratorFunction
          DEFAULT_ORIGIN_HOST: !Ref DefaultOriginHost
          AGENT_RUNTIME_ARN: !Ref AgentRuntimeArn
          AGENTCORE_REGION: !Ref "AWS::Region"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
        - LambdaInvokePolicy:
            FunctionName: !Ref GeoGeneratorFunction
        - Statement:
            - Effect: Allow
              Action:
                - bedrock-agentcore:InvokeAgentRuntime
              Resource:
                - !If
                  - HasAgentArn
                  - !Ref AgentRuntimeArn
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*"
                - !If
                  - HasAgentArn
                  - !Sub "${AgentRuntimeArn}/runtime-endpoint/*"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*/runtime-endpoint/*"
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: GET
            RestApiId: !Ref GeoApi

  # Lambda: async worker that calls AgentCore and writes to DDB
  GeoGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: geo-content-generator
      Handler: geo_generator.handler
      Runtime: python3.10
      CodeUri: lambda/
      MemorySize: 512
      Timeout: 120
      Environment:
        Variables:
          GEO_TABLE_NAME: !Ref TableName
          AGENT_RUNTIME_ARN: !Ref AgentRuntimeArn
          AGENTCORE_REGION: !Ref "AWS::Region"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
        - Statement:
            - Effect: Allow
              Action:
                - bedrock-agentcore:InvokeAgentRuntime
              Resource:
                - !If
                  - HasAgentArn
                  - !Ref AgentRuntimeArn
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*"
                - !If
                  - HasAgentArn
                  - !Sub "${AgentRuntimeArn}/runtime-endpoint/*"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*/runtime-endpoint/*"

  # API Gateway
  GeoApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL for GEO content
    Value: !Sub "https://${GeoApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  FunctionUrl:
    Description: Lambda Function URL for GEO content (use this for CloudFront origin)
    Value: !GetAtt GeoContentFunctionUrl.FunctionUrl
  TableName:
    Description: DynamoDB table name
    Value: !Ref GeoContentTable
  GeneratorFunctionName:
    Description: Async generator Lambda function name
    Value: !Ref GeoGeneratorFunction
